name: StellarPay CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Soroban Contract Tests ─────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm

  # ── Frontend Tests & Build ─────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_SPLIT_BILL_CONTRACT_ID: ${{ secrets.SPLIT_BILL_CONTRACT_ID }}
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: ${{ secrets.ESCROW_CONTRACT_ID }}
          NEXT_PUBLIC_USDC_ISSUER: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
          NEXT_PUBLIC_USDC_CODE: USDC
        run: npm run build

  # ── Deploy to Vercel (main branch only) ────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
